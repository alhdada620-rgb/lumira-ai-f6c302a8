<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumira · Health & Elegance Smart Mirror</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors *; img-src * data: blob:; script-src * 'unsafe-inline' 'unsafe-eval';">

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // تهيئة الـ SDK فور تحميل الصفحة بنفس طريقتك الناجحة
        window.onload = function() {
            if (window.Pi) {
                try {
                    window.Pi.init({ version: "1.5", sandbox: true });
                    console.log("Pi SDK Initialized");
                } catch (e) {
                    console.error("Pi Init Error:", e);
                }
            } else {
                console.log("Running outside Pi Browser");
            }
        };
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
